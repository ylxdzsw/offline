<template id="offline-shell-template">
    <style>
        :host {
            display: block;
            width: min(100%, var(--shell-max, 480px));
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0 auto;
            color: var(--ink);
            background: var(--bg-shell);
            box-shadow: var(--shadow);
        }
        .layout {
            display: grid;
            min-height: 100vh;
            min-height: 100dvh;
            grid-template-rows: auto 1fr auto;
        }
        header {
            position: sticky;
            z-index: 20;
            top: 0;
            display: grid;
            grid-template-columns: 48px 1fr 48px;
            align-items: center;
            min-height: calc(52px + var(--safe-top, 0px));
            padding: var(--safe-top, 0px) 4px 0;
            color: var(--header-ink);
            background: color-mix(in srgb, var(--header-bg) 92%, transparent);
            border-bottom: 1px solid var(--header-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        h1 {
            overflow: hidden;
            margin: 0;
            font-family: var(--font-display);
            font-size: 1.05rem;
            font-weight: 650;
            letter-spacing: -.01em;
            text-align: center;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .icon-button {
            display: grid;
            width: 44px;
            height: 44px;
            border: 0;
            border-radius: 50%;
            place-items: center;
            color: inherit;
            background: transparent;
        }
        .icon-button[hidden] { display: none; }
        .icon-button:active { background: var(--bg-muted); }
        .menu-lines, .menu-lines::before, .menu-lines::after {
            width: 18px;
            height: 1.5px;
            border-radius: 1px;
            background: currentColor;
        }
        .menu-lines { position: relative; }
        .menu-lines::before, .menu-lines::after { position: absolute; left: 0; content: ""; }
        .menu-lines::before { top: -6px; }
        .menu-lines::after { top: 6px; }
        main {
            min-width: 0;
            padding: 16px max(14px, var(--safe-right, 0px)) 20px max(14px, var(--safe-left, 0px));
        }
        footer {
            padding: 8px 14px calc(10px + var(--safe-bottom, 0px));
            color: var(--ink-faint);
            font-size: .62rem;
            line-height: 1.5;
            text-align: center;
            border-top: 1px solid var(--border);
        }
        footer a { color: inherit; text-decoration: underline; text-underline-offset: 2px; }
        .backdrop {
            position: fixed;
            z-index: 40;
            inset: 0;
            border: 0;
            opacity: 0;
            pointer-events: none;
            background: var(--drawer-scrim);
            transition: opacity .18s ease;
        }
        aside {
            position: fixed;
            z-index: 41;
            top: 0;
            bottom: 0;
            left: max(0px, calc((100vw - var(--shell-max, 480px)) / 2));
            width: min(84vw, 320px);
            overflow-y: auto;
            padding: calc(12px + var(--safe-top, 0px)) 14px calc(14px + var(--safe-bottom, 0px));
            color: var(--ink);
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            box-shadow: var(--shadow);
            overscroll-behavior: contain;
            transform: translateX(-110%);
            transition: transform .2s ease;
        }
        :host([drawer-open]) .backdrop { opacity: 1; pointer-events: auto; }
        :host([drawer-open]) aside { transform: translateX(0); }
        .drawer-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .brand {
            font-family: var(--font-display);
            font-size: 1.12rem;
            font-weight: 700;
            letter-spacing: -.02em;
            color: var(--ink);
        }
        nav { display: grid; gap: 6px; }
        nav a {
            display: flex;
            min-height: 46px;
            align-items: center;
            padding: 0 14px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            text-decoration: none;
            color: var(--ink);
            background: transparent;
            border: 1px solid transparent;
        }
        nav a:hover { background: var(--bg-elevated); }
        nav a[aria-current="page"] {
            color: var(--accent-ink);
            background: var(--accent);
            border-color: transparent;
        }
        .section {
            margin-top: 22px;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }
        .section-label {
            margin: 0 0 9px;
            color: var(--ink-muted);
            font-size: .78rem;
            font-weight: 600;
            letter-spacing: .04em;
            text-transform: uppercase;
        }
        .segmented {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            padding: 4px;
            border-radius: var(--radius-md);
            background: var(--bg-elevated);
            border: 1px solid var(--border);
        }
        .segmented.triple { grid-template-columns: 1fr 1fr 1fr; }
        .segmented button {
            min-height: 40px;
            border: 0;
            border-radius: calc(var(--radius-md) - 3px);
            color: var(--ink-muted);
            font-weight: 600;
            font-size: .86rem;
            background: transparent;
        }
        .segmented button[aria-pressed="true"] {
            color: var(--ink);
            background: var(--bg-surface);
            box-shadow: var(--shadow-soft);
        }
        .info-mark {
            display: grid;
            width: 18px;
            height: 18px;
            border: 1.5px solid currentColor;
            border-radius: 50%;
            place-items: center;
            font-family: var(--font-display);
            font-size: .74rem;
            font-weight: 700;
            line-height: 1;
        }
        .guide-dialog {
            width: min(calc(100vw - 28px), 420px);
            max-height: min(calc(100dvh - 40px), 620px);
            overflow: auto;
            padding: 0;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            color: var(--ink);
            background: var(--bg-surface);
            box-shadow: var(--shadow);
        }
        .guide-dialog::backdrop {
            background: var(--drawer-scrim);
            backdrop-filter: blur(2px);
        }
        .guide-content { padding: 18px 18px max(18px, var(--safe-bottom, 0px)); }
        .guide-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .guide-head h2 {
            margin: 0;
            color: var(--ink);
            font-family: var(--font-display);
            font-size: 1.2rem;
            letter-spacing: -.01em;
        }
        .guide-close { flex: 0 0 auto; color: var(--ink-muted); }
        .guide-intro {
            margin: 10px 0 16px;
            color: var(--ink-muted);
            font-size: .91rem;
            line-height: 1.55;
        }
        .guide-dialog section { margin-top: 14px; }
        .guide-dialog h3 {
            margin: 0 0 7px;
            color: var(--ink);
            font-size: .78rem;
            font-weight: 700;
            letter-spacing: .05em;
            text-transform: uppercase;
        }
        .guide-dialog ul {
            display: grid;
            gap: 7px;
            margin: 0;
            padding-left: 18px;
            color: var(--ink-muted);
            font-size: .86rem;
            line-height: 1.5;
        }
        .guide-dialog li::marker { color: var(--accent); }
        .guide-done {
            width: 100%;
            min-height: 44px;
            margin-top: 18px;
            border: 0;
            border-radius: var(--radius-sm);
            color: var(--accent-ink);
            font-weight: 700;
            background: var(--accent);
        }
        .guide-done:active { filter: brightness(.95); }
        @media (max-width: 340px) {
            main { padding-inline: 8px; }
            .guide-content { padding: 15px; }
            .segmented button { font-size: .78rem; }
        }
    </style>
    <div class="layout">
        <header>
            <button class="icon-button menu" type="button" aria-controls="offline-shell-drawer" aria-expanded="false"><span class="menu-lines"></span></button>
            <h1></h1>
            <button class="icon-button guide-trigger" type="button" hidden><span class="info-mark" aria-hidden="true">i</span></button>
        </header>
        <main><slot></slot></main>
        <footer>
            <span class="copyright"></span><br>
            <a href="https://github.com/ylxdzsw/offline" rel="external noopener"></a>
        </footer>
    </div>
    <button class="backdrop" type="button" tabindex="-1"></button>
    <aside id="offline-shell-drawer" aria-hidden="true" inert>
        <div class="drawer-head">
            <span class="brand"></span>
            <button class="icon-button close" type="button" aria-label="Close">✕</button>
        </div>
        <nav></nav>
        <section class="section language">
            <p class="section-label language-label"></p>
            <div class="segmented language-buttons">
                <button type="button" data-lang="zh">中文</button>
                <button type="button" data-lang="en">English</button>
            </div>
        </section>
        <section class="section appearance">
            <p class="section-label appearance-label"></p>
            <div class="segmented triple theme-buttons">
                <button type="button" data-theme="system"></button>
                <button type="button" data-theme="light"></button>
                <button type="button" data-theme="dark"></button>
            </div>
        </section>
    </aside>
    <dialog class="guide-dialog" aria-labelledby="guide-title">
        <div class="guide-content">
            <div class="guide-head">
                <h2 id="guide-title"></h2>
                <button class="icon-button guide-close" type="button">✕</button>
            </div>
            <p class="guide-intro"></p>
            <section>
                <h3 class="rules-title"></h3>
                <ul class="guide-rules"></ul>
            </section>
            <section>
                <h3 class="tips-title"></h3>
                <ul class="guide-tips"></ul>
            </section>
            <button class="guide-done" type="button"></button>
        </div>
    </dialog>
</template>

<script>
customElements.define('offline-shell', class extends HTMLElement {
    constructor() {
        super()
        this.attachShadow({mode: 'open'}).append(document.getElementById('offline-shell-template').content.cloneNode(true))
    }

    connectedCallback() {
        const {i18n, theme} = OfflineGames
        const page = this.getAttribute('page') || 'gallery'
        const titleKey = page === 'gallery' ? 'gallery' : page
        const shadow = this.shadowRoot
        const guide = i18n.guide(page)
        const layout = shadow.querySelector('.layout')
        const aside = shadow.querySelector('aside')
        const menu = shadow.querySelector('.menu')
        const open = () => {
            this.setAttribute('drawer-open', '')
            layout.setAttribute('inert', '')
            aside.removeAttribute('inert')
            aside.setAttribute('aria-hidden', 'false')
            menu.setAttribute('aria-expanded', 'true')
            shadow.querySelector('.close').focus()
        }
        const close = () => {
            this.removeAttribute('drawer-open')
            aside.setAttribute('inert', '')
            aside.setAttribute('aria-hidden', 'true')
            layout.removeAttribute('inert')
            menu.setAttribute('aria-expanded', 'false')
            menu.focus()
        }

        shadow.querySelector('h1').textContent = i18n.t(titleKey)
        shadow.querySelector('.brand').textContent = i18n.t('siteName')
        shadow.querySelector('.menu').setAttribute('aria-label', i18n.t('menu'))
        shadow.querySelector('.close').setAttribute('aria-label', i18n.t('close'))
        shadow.querySelector('.language-label').textContent = i18n.t('language')
        shadow.querySelector('.appearance-label').textContent = i18n.t('appearance')
        shadow.querySelector('.copyright').textContent = i18n.t('copyright')
        shadow.querySelector('footer a').textContent = i18n.t('source')
        document.title = `${i18n.t(titleKey)} · ${i18n.t('siteName')}`

        const themeLabels = {
            system: i18n.t('themeSystem'),
            light: i18n.t('themeLight'),
            dark: i18n.t('themeDark'),
        }
        for (const button of shadow.querySelectorAll('[data-theme]')) {
            button.textContent = themeLabels[button.dataset.theme]
        }
        const paintTheme = () => {
            const preference = theme.getPreference()
            for (const button of shadow.querySelectorAll('[data-theme]')) {
                button.setAttribute('aria-pressed', String(button.dataset.theme === preference))
            }
        }
        paintTheme()
        this._unsubTheme = theme.subscribe(paintTheme)

        const navigation = [{id: 'gallery', page: 'index.html'}, ...(OfflineGames.catalog || []).map(game => ({id: game.id, page: game.id + '.html'}))]
        shadow.querySelector('nav').replaceChildren(...navigation.map(item => {
            const link = document.createElement('a')
            link.dataset.page = item.id
            link.href = './' + item.page
            return link
        }))

        const introButton = shadow.querySelector('.guide-trigger')
        const guideDialog = shadow.querySelector('.guide-dialog')
        if (guide) {
            introButton.hidden = false
            introButton.setAttribute('aria-label', i18n.t('openGuide'))
            shadow.querySelector('#guide-title').textContent = i18n.t('howToPlay')
            shadow.querySelector('.guide-close').setAttribute('aria-label', i18n.t('close'))
            shadow.querySelector('.guide-intro').textContent = guide.intro
            shadow.querySelector('.rules-title').textContent = i18n.t('rules')
            shadow.querySelector('.tips-title').textContent = i18n.t('basicTips')
            shadow.querySelector('.guide-rules').replaceChildren(...guide.rules.map(item => Object.assign(document.createElement('li'), {textContent: item})))
            shadow.querySelector('.guide-tips').replaceChildren(...guide.tips.map(item => Object.assign(document.createElement('li'), {textContent: item})))
            shadow.querySelector('.guide-done').textContent = i18n.t('gotIt')
            introButton.addEventListener('click', () => guideDialog.showModal())
            shadow.querySelector('.guide-close').addEventListener('click', () => guideDialog.close())
            shadow.querySelector('.guide-done').addEventListener('click', () => guideDialog.close())
            guideDialog.addEventListener('click', event => { if (event.target === guideDialog) guideDialog.close() })
            guideDialog.addEventListener('close', () => introButton.focus())
        }

        for (const link of shadow.querySelectorAll('nav a')) {
            const key = link.dataset.page
            link.textContent = i18n.t(key === 'gallery' ? 'gallery' : key)
            link.href = i18n.href(link.getAttribute('href'))
            if (key === page) link.setAttribute('aria-current', 'page')
        }
        for (const button of shadow.querySelectorAll('[data-lang]')) {
            button.setAttribute('aria-pressed', String(button.dataset.lang === i18n.locale))
            button.addEventListener('click', () => i18n.setLocale(button.dataset.lang))
        }
        for (const button of shadow.querySelectorAll('[data-theme]')) {
            button.addEventListener('click', () => theme.setPreference(button.dataset.theme))
        }
        shadow.querySelector('.menu').addEventListener('click', open)
        shadow.querySelector('.close').addEventListener('click', close)
        shadow.querySelector('.backdrop').addEventListener('click', close)
        this.addEventListener('keydown', event => {
            if (event.key === 'Escape' && this.hasAttribute('drawer-open')) close()
        })
    }

    disconnectedCallback() {
        if (this._unsubTheme) this._unsubTheme()
    }
})
</script>
