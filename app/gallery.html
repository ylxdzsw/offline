<style>
    .game-gallery { display: block; }
    .game-gallery .intro {
        margin: 2px 2px 18px;
        color: var(--ink-muted);
        font-size: .95rem;
        line-height: 1.55;
        letter-spacing: -.005em;
    }
    .game-gallery .games {
        display: grid;
        gap: 12px;
    }
    .game-gallery article {
        display: grid;
        grid-template-columns: 88px 1fr;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--bg-surface);
        box-shadow: var(--shadow-soft);
        transition: border-color .15s ease, box-shadow .15s ease;
    }
    .game-gallery article:active {
        border-color: var(--border-strong);
    }
    .game-gallery .preview {
        position: relative;
        display: grid;
        min-height: 108px;
        place-items: center;
        color: var(--ink);
        background: var(--bg-elevated);
        border-right: 1px solid var(--border);
    }
    .game-gallery article[data-game="xiangqi"] .preview { color: var(--piece-red); background: color-mix(in srgb, var(--board-wood) 55%, var(--bg-elevated)); }
    .game-gallery article[data-game="wuziqi"] .preview { color: var(--board-wood-line); background: color-mix(in srgb, var(--board-wood) 50%, var(--bg-elevated)); }
    .game-gallery article[data-game="sudoku"] .preview { color: var(--ink); background: var(--board-paper); }
    .game-gallery article[data-game="junqi"] .preview { color: var(--piece-red); background: color-mix(in srgb, var(--board-wood) 40%, var(--bg-elevated)); }
    .game-gallery article[data-game="chess"] .preview { color: var(--ink); background: color-mix(in srgb, var(--board-dark) 35%, var(--bg-elevated)); }
    .game-gallery article[data-game="reversi"] .preview { color: var(--stone-white); background: color-mix(in srgb, var(--board-felt) 70%, var(--bg-elevated)); }
    .game-gallery .xiangqi-mark {
        display: grid;
        width: 56px;
        height: 56px;
        border: 2px solid currentColor;
        border-radius: 50%;
        place-items: center;
        font-family: var(--font-display);
        font-size: 1.7rem;
        font-weight: 700;
        background: var(--piece-face);
        box-shadow: inset 0 0 0 1px color-mix(in srgb, currentColor 25%, transparent);
    }
    .game-gallery .gomoku-mark {
        position: relative;
        width: 62px;
        height: 62px;
        background-image:
            linear-gradient(var(--board-wood-line) 1px, transparent 1px),
            linear-gradient(90deg, var(--board-wood-line) 1px, transparent 1px);
        background-size: 15.5px 15.5px;
        background-color: color-mix(in srgb, var(--board-wood) 70%, transparent);
        border-radius: 4px;
    }
    .game-gallery .gomoku-mark::before, .game-gallery .gomoku-mark::after {
        position: absolute;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        content: "";
    }
    .game-gallery .gomoku-mark::before {
        top: 8px;
        left: 8px;
        background: radial-gradient(circle at 35% 30%, #4a4a48, var(--stone-black) 70%);
    }
    .game-gallery .gomoku-mark::after {
        right: 8px;
        bottom: 8px;
        border: 1px solid var(--stone-white-edge);
        background: radial-gradient(circle at 35% 30%, #fff, var(--stone-white) 72%);
    }
    .game-gallery .sudoku-mark {
        display: grid;
        width: 58px;
        height: 58px;
        grid-template-columns: repeat(3, 1fr);
        border: 2px solid var(--board-paper-box);
        background: var(--board-paper);
    }
    .game-gallery .sudoku-mark i {
        display: grid;
        border: 1px solid var(--board-paper-line);
        place-items: center;
        font-family: var(--font-display);
        font-size: .95rem;
        font-style: normal;
        font-weight: 700;
        color: var(--ink);
    }
    .game-gallery .junqi-mark {
        display: grid;
        width: 68px;
        height: 58px;
        grid-template-columns: repeat(3, 1fr);
        gap: 4px;
    }
    .game-gallery .junqi-mark i {
        display: grid;
        border: 1.5px solid currentColor;
        border-radius: 4px;
        place-items: center;
        font-family: var(--font-display);
        font-size: .62rem;
        font-style: normal;
        font-weight: 800;
        background: var(--piece-face);
        color: var(--piece-red);
    }
    .game-gallery .junqi-mark i:nth-child(n+4) { color: var(--piece-black); }
    .game-gallery .chess-mark {
        position: relative;
        display: grid;
        width: 58px;
        height: 58px;
        grid-template: repeat(2, 1fr) / repeat(2, 1fr);
        overflow: hidden;
        border: 2px solid var(--border-strong);
        border-radius: 4px;
    }
    .game-gallery .chess-mark i:nth-child(1),
    .game-gallery .chess-mark i:nth-child(4) { background: var(--board-dark); }
    .game-gallery .chess-mark i:nth-child(2),
    .game-gallery .chess-mark i:nth-child(3) { background: var(--board-light); }
    .game-gallery .chess-mark::after {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: var(--ink);
        content: "♘";
        font-family: var(--font-display);
        font-size: 2rem;
        font-weight: 700;
        text-shadow: 0 1px color-mix(in srgb, var(--bg-surface) 70%, transparent);
    }
    .game-gallery .reversi-mark {
        display: grid;
        width: 64px;
        height: 64px;
        grid-template-columns: repeat(4, 1fr);
        gap: 3px;
        padding: 5px;
        border: 2px solid var(--board-felt-edge);
        border-radius: 6px;
        background: var(--board-felt);
    }
    .game-gallery .reversi-mark i {
        border-radius: 50%;
        box-shadow: 0 1px 2px rgba(0, 0, 0, .25);
    }
    .game-gallery .reversi-mark i:nth-child(1),
    .game-gallery .reversi-mark i:nth-child(4),
    .game-gallery .reversi-mark i:nth-child(6),
    .game-gallery .reversi-mark i:nth-child(11),
    .game-gallery .reversi-mark i:nth-child(13),
    .game-gallery .reversi-mark i:nth-child(16) {
        background: radial-gradient(circle at 35% 28%, #fff, var(--stone-white) 72%);
    }
    .game-gallery .reversi-mark i:not(:nth-child(1)):not(:nth-child(4)):not(:nth-child(6)):not(:nth-child(11)):not(:nth-child(13)):not(:nth-child(16)) {
        background: radial-gradient(circle at 35% 28%, #555, var(--stone-black) 70%);
    }
    .game-gallery .content {
        display: grid;
        align-content: center;
        gap: 4px;
        padding: 12px 14px 14px;
        min-width: 0;
    }
    .game-gallery h2 {
        margin: 0;
        color: var(--ink);
        font-family: var(--font-display);
        font-size: 1.08rem;
        font-weight: 700;
        letter-spacing: -.015em;
    }
    .game-gallery p {
        margin: 0 0 10px;
        color: var(--ink-muted);
        font-size: .82rem;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    .game-gallery a {
        display: inline-flex;
        min-height: 36px;
        width: fit-content;
        align-items: center;
        justify-content: center;
        padding: 0 14px;
        border-radius: var(--radius-sm);
        color: var(--accent-ink);
        font-size: .88rem;
        font-weight: 700;
        text-decoration: none;
        background: var(--accent);
    }
    .game-gallery a:active { filter: brightness(.96); }
    @media (max-width: 340px) {
        .game-gallery article { grid-template-columns: 76px 1fr; }
        .game-gallery .preview { min-height: 96px; }
        .game-gallery h2 { font-size: 1rem; }
    }
</style>

<script>
(() => {
    const render = () => {
        const root = document.querySelector('.game-gallery')
        if (!root) return
        if (!root.querySelector('.intro')) {
            root.replaceChildren(
                Object.assign(document.createElement('p'), {className: 'intro'}),
                Object.assign(document.createElement('div'), {className: 'games'}),
            )
        }
        const {i18n, storage} = OfflineGames
        root.querySelector('.intro').textContent = i18n.locale === 'zh'
            ? '无需联网。选一款经典游戏，随时开局。'
            : 'No connection needed. Pick a classic and play anywhere.'
        const marks = {
            xiangqi: '<span class="xiangqi-mark">棋</span>',
            wuziqi: '<span class="gomoku-mark"></span>',
            sudoku: '<span class="sudoku-mark"><i>8</i><i></i><i>2</i><i></i><i>5</i><i></i><i>1</i><i></i><i>9</i></span>',
            junqi: '<span class="junqi-mark"><i>司</i><i>旗</i><i>工</i><i>弹</i><i>师</i><i>雷</i></span>',
            chess: '<span class="chess-mark"><i></i><i></i><i></i><i></i></span>',
            reversi: '<span class="reversi-mark">' + '<i></i>'.repeat(16) + '</span>',
        }
        root.querySelector('.games').innerHTML = (OfflineGames.catalog || []).map(game => `
            <article data-game="${game.id}">
                <div class="preview">${marks[game.id] || ''}</div>
                <div class="content">
                    <h2>${i18n.t(game.id)}</h2>
                    <p>${i18n.t(game.id + 'Desc')}</p>
                    <a href="${i18n.href('./' + game.id + '.html')}">${i18n.t(storage.hasProgress(game.id) ? 'continue' : 'play')}</a>
                </div>
            </article>
        `).join('')
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', render, {once: true})
    else render()
})()
</script>
