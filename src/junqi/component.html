<template id="junqi-game-template">
    <style>
        :host { display: block; }
        .toolbar { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; align-items: end; margin-bottom: 10px; }
        label { display: grid; gap: 3px; color: #746658; font-size: .7rem; }
        select, button { min-height: 42px; border: 1px solid #cdbb9d; border-radius: 9px; color: #44372f; background: #fffaf0; }
        select { min-width: 96px; padding: 0 28px 0 10px; }
        button { padding: 0 12px; font-weight: 650; touch-action: manipulation; }
        button:disabled { opacity: .42; }
        .status { display: flex; min-height: 40px; align-items: center; justify-content: center; margin: 0 0 9px; padding: 4px 10px; border-radius: 9px; color: #5a4037; font-size: .88rem; font-weight: 700; text-align: center; background: #efe1c9; }
        .status.thinking::after { width: 5px; height: 5px; margin-left: 7px; border-radius: 50%; content: ""; background: currentColor; animation: pulse .8s ease-in-out infinite alternate; }
        @keyframes pulse { to { opacity: .2; transform: scale(.7); } }
        .warning { margin: 0 0 9px; color: #8c3c35; font-size: .77rem; text-align: center; }
        .warning[hidden] { display: none; }
        .board { position: relative; display: grid; width: 100%; aspect-ratio: 5 / 7.35; grid-template: repeat(12, 1fr) / repeat(5, 1fr); overflow: hidden; border: 2px solid #71513a; border-radius: 10px; background: #d9bd83; box-shadow: inset 0 0 28px rgba(80,48,22,.14), 0 4px 12px rgba(69,44,28,.14); user-select: none; }
        .square { position: relative; display: grid; min-width: 0; min-height: 0; padding: 3px; border: 0; border-radius: 0; place-items: center; background: transparent; }
        .square::before, .square::after { position: absolute; z-index: 0; content: ""; background: #9c8056; }
        .square::before { width: 100%; height: 1px; }
        .square::after { width: 1px; height: 100%; }
        .square.rail-h::before { height: 5px; border-block: 1px solid #6f573a; background: transparent; }
        .square.rail-v::after { width: 5px; border-inline: 1px solid #6f573a; background: transparent; }
        .square.camp::before { width: 54%; height: 54%; border: 1px solid #856946; transform: rotate(45deg); background: #ead39b; }
        .square.camp::after { display: none; }
        .square.hq::before { width: 72%; height: 62%; border: 2px double #80603e; background: rgba(238,211,157,.8); }
        .square.hq::after { display: none; }
        .square.legal::before { width: 15px; height: 15px; border: 0; border-radius: 50%; background: rgba(45,94,72,.55); }
        .square.capture::before { width: 72%; height: 72%; border: 3px solid rgba(151,49,42,.72); border-radius: 10px; background: transparent; }
        .piece { position: relative; z-index: 2; display: grid; width: min(88%, 58px); height: min(80%, 37px); border: 2px solid currentColor; border-radius: 7px; place-items: center; font-family: "Noto Serif SC", Georgia, serif; font-size: clamp(.69rem, 3vw, .9rem); font-weight: 800; line-height: 1; background: #f8e8bf; box-shadow: 0 2px 3px rgba(55,35,20,.25); }
        .piece.red { color: #a02e27; }
        .piece.black { color: #303a40; }
        .piece.hidden { color: #665340; background: repeating-linear-gradient(135deg,#866d4f 0 4px,#b99b6a 4px 8px); }
        .square.selected .piece { outline: 3px solid #38758c; outline-offset: 1px; transform: translateY(-1px); }
        .square.last { background: rgba(255,249,216,.36); }
        .river { position: absolute; z-index: 1; top: 50%; left: 20%; width: 60%; border-top: 2px dashed rgba(101,75,47,.55); pointer-events: none; }
        .legend { display: flex; justify-content: center; gap: 18px; margin-top: 8px; color: #786958; font-size: .7rem; }
        .legend span::before { display: inline-block; width: 9px; height: 9px; margin-right: 4px; border-radius: 50%; content: ""; background: #a02e27; }
        .legend span:last-child::before { background: #303a40; }
        @media (max-width: 340px) { .toolbar { gap: 4px; } button { padding-inline: 8px; font-size: .82rem; } select { min-width: 86px; } .piece { border-width: 1px; } }
    </style>
    <div class="toolbar">
        <label><span class="difficulty-label"></span><select class="difficulty"><option value="easy"></option><option value="medium"></option><option value="hard"></option></select></label>
        <button class="undo" type="button"></button><button class="new" type="button"></button>
    </div>
    <p class="warning" hidden></p>
    <div class="status" role="status" aria-live="polite"></div>
    <div class="board" role="grid"><i class="river"></i></div>
    <div class="legend"><span class="your-side"></span><span class="enemy-side"></span></div>
</template>

<script>
customElements.define('junqi-game', class extends HTMLElement {
    constructor() {
        super(); this.attachShadow({mode: 'open'}).append(document.getElementById('junqi-game-template').content.cloneNode(true))
        this.selected = null; this.thinking = false; this.worker = null; this.requestId = 0
    }
    connectedCallback() {
        this.engine = OfflineGames.Junqi; this.i18n = OfflineGames.i18n; this.storage = OfflineGames.storage
        this.load(); this.bind(); this.localize(); this.render()
        if (this.state.turn === this.engine.BLACK && !this.state.outcome) this.requestAI()
    }
    disconnectedCallback() { this.cancelAI() }
    fresh(difficulty = 'medium') { return {schema: 1, game: 'junqi', difficulty, board: this.engine.initialBoard(), turn: this.engine.RED, revealed: [], history: [], lastMove: null, message: null, outcome: null} }
    valid(saved) { return saved && Array.isArray(saved.board) && saved.board.length === 60 && [this.engine.RED,this.engine.BLACK].includes(saved.turn) && ['easy','medium','hard'].includes(saved.difficulty) && Array.isArray(saved.revealed) && Array.isArray(saved.history) }
    load() { const saved = this.storage.read('junqi'); this.state = this.valid(saved) ? saved : this.fresh() }
    bind() {
        const s = this.shadowRoot
        s.querySelector('.board').addEventListener('click', event => { const square = event.target.closest('.square'); if (square) this.tap(Number(square.dataset.index)) })
        s.querySelector('.undo').addEventListener('click', () => this.undo())
        s.querySelector('.new').addEventListener('click', () => this.newGame())
        s.querySelector('.difficulty').addEventListener('change', event => { this.state.difficulty = event.target.value; this.save() })
    }
    localize() {
        const s = this.shadowRoot, t = key => this.i18n.t(key)
        s.querySelector('.difficulty-label').textContent = t('difficulty'); for (const option of s.querySelectorAll('option')) option.textContent = t(option.value)
        s.querySelector('.undo').textContent = t('undo'); s.querySelector('.new').textContent = t('newGame'); s.querySelector('.warning').textContent = t('storageWarning')
        s.querySelector('.your-side').textContent = t('junqiYourSide'); s.querySelector('.enemy-side').textContent = t('junqiEnemySide')
    }
    save() { if (!this.storage.write('junqi', this.state)) this.shadowRoot.querySelector('.warning').hidden = false }
    tap(index) {
        if (this.thinking || this.state.outcome || this.state.turn !== this.engine.RED) return
        const value = this.state.board[index]
        if (value?.side === this.engine.RED) { this.selected = this.engine.movesFor(this.state.board,index).length ? index : null; this.render(); return }
        if (this.selected != null && this.engine.movesFor(this.state.board,this.selected).some(move => move.to === index)) this.commit({from:this.selected,to:index}, this.engine.RED)
        else { this.selected = null; this.render() }
    }
    snapshot(mover) { return {mover, board:this.state.board, turn:this.state.turn, revealed:this.state.revealed, lastMove:this.state.lastMove, message:this.state.message, outcome:this.state.outcome} }
    commit(move, side) {
        this.state.history.push(this.snapshot(side))
        const result = this.engine.applyMove(this.state.board,move)
        this.state.board = result.board; this.state.revealed = [...new Set([...this.state.revealed,...result.revealed])]
        this.state.turn = this.engine.other(side); this.state.lastMove = move; this.state.message = result.defender ? result.result : null; this.selected = null
        const outcome = this.engine.status(this.state.board,this.state.turn); this.state.outcome = outcome.ended ? outcome : null
        this.save(); this.render(); if (!this.state.outcome && this.state.turn === this.engine.BLACK) this.requestAI()
    }
    requestAI() {
        this.cancelAI(); this.thinking = true; const id = ++this.requestId
        this.worker = OfflineGames.runtime.createWorker('junqi-worker-payload')
        this.worker.onmessage = event => { if (event.data.id !== id || !this.thinking) return; const move = event.data.move; this.cancelAI(false); if (move && this.engine.movesFor(this.state.board,move.from).some(candidate => candidate.to === move.to)) this.commit(move,this.engine.BLACK) }
        this.worker.onerror = error => { console.error(error); this.cancelAI(false); this.render() }
        this.worker.postMessage({id,board:this.state.board,side:this.engine.BLACK,difficulty:this.state.difficulty,revealed:this.state.revealed}); this.render()
    }
    cancelAI(invalidate=true) { if (invalidate) this.requestId++; if (this.worker) this.worker.terminate(); this.worker=null; this.thinking=false }
    undo() {
        if (!this.state.history.length) return
        const wasThinking = this.thinking; this.cancelAI(); let count = wasThinking || this.state.history.at(-1).mover === this.engine.RED ? 1 : 2; let previous
        while (count-- > 0 && this.state.history.length) previous = this.state.history.pop()
        if (previous) Object.assign(this.state,{board:previous.board,turn:previous.turn,revealed:previous.revealed,lastMove:previous.lastMove,message:previous.message,outcome:previous.outcome})
        this.selected=null; this.save(); this.render()
    }
    newGame() { if (this.state.history.length && !confirm(this.i18n.t('confirmNew'))) return; const difficulty=this.state.difficulty; this.cancelAI(); this.state=this.fresh(difficulty); this.selected=null; this.save(); this.render() }
    pieceLabel(value, visible) { return visible ? this.i18n.t('junqiPiece'+value.type) : '◆' }
    statusText() {
        if (this.state.outcome) return this.i18n.t(this.state.outcome.winner === this.engine.RED ? 'youWin' : 'aiWins')
        if (this.thinking || this.state.turn === this.engine.BLACK) return this.i18n.t('aiThinking')
        if (this.state.message) return this.i18n.t('junqiBattle'+this.state.message[0].toUpperCase()+this.state.message.slice(1))
        return this.i18n.t('yourTurn')
    }
    render() {
        const s=this.shadowRoot, legal=this.selected==null?[]:this.engine.movesFor(this.state.board,this.selected), targets=new Map(legal.map(move=>[move.to,Boolean(this.state.board[move.to])])), revealed=new Set(this.state.revealed)
        const squares=this.state.board.map((value,index)=>{
            const row=this.engine.rowOf(index), column=this.engine.columnOf(index), classes=['square']
            if ([1,5,6,10].includes(row)) classes.push('rail-h'); if ([0,4].includes(column)&&row>=1&&row<=10) classes.push('rail-v')
            if (this.engine.isCamp(index)) classes.push('camp'); if (this.engine.isHQ(index)) classes.push('hq'); if (index===this.selected) classes.push('selected')
            if (targets.has(index)) classes.push(targets.get(index)?'capture':'legal'); if (this.state.lastMove&&(index===this.state.lastMove.from||index===this.state.lastMove.to)) classes.push('last')
            const visible=value&&(value.side===this.engine.RED||revealed.has(value.id)||this.state.outcome)
            const token=value?`<span class="piece ${value.side===this.engine.RED?'red':'black'} ${visible?'':'hidden'}">${this.pieceLabel(value,visible)}</span>`:''
            const name=value?(visible?this.i18n.t('junqiPiece'+value.type):this.i18n.t('hiddenPiece')):this.i18n.t('empty')
            return `<button type="button" role="gridcell" class="${classes.join(' ')}" data-index="${index}" aria-label="${name}, ${this.i18n.t('row')} ${row+1}, ${this.i18n.t('column')} ${column+1}">${token}</button>`
        }).join('')
        s.querySelector('.board').innerHTML=squares+'<i class="river"></i>'; const status=s.querySelector('.status'); status.textContent=this.statusText(); status.classList.toggle('thinking',this.thinking)
        s.querySelector('.difficulty').value=this.state.difficulty; s.querySelector('.undo').disabled=!this.state.history.length
    }
})
</script>
