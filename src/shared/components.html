<template id="offline-shell-template">
    <style>
        :host {
            display: block;
            width: min(100%, 480px);
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0 auto;
            background: #f8f1e3;
            box-shadow: 0 0 28px rgba(66, 46, 31, .18);
        }
        .layout {
            display: grid;
            min-height: 100vh;
            min-height: 100dvh;
            grid-template-rows: auto 1fr auto;
        }
        header {
            position: sticky;
            z-index: 20;
            top: 0;
            display: grid;
            grid-template-columns: 48px 1fr 48px;
            align-items: center;
            min-height: calc(52px + env(safe-area-inset-top));
            padding: env(safe-area-inset-top) 4px 0;
            color: #fffaf0;
            background: #762f2b;
            box-shadow: 0 1px 4px rgba(39, 20, 16, .3);
        }
        h1 {
            overflow: hidden;
            margin: 0;
            font-family: Georgia, "Noto Serif SC", serif;
            font-size: 1.08rem;
            font-weight: 650;
            text-align: center;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .icon-button {
            display: grid;
            width: 44px;
            height: 44px;
            border: 0;
            border-radius: 50%;
            place-items: center;
            color: inherit;
            background: transparent;
        }
        .icon-button:active { background: rgba(255, 255, 255, .14); }
        .menu-lines, .menu-lines::before, .menu-lines::after {
            width: 20px;
            height: 2px;
            border-radius: 1px;
            background: currentColor;
        }
        .menu-lines { position: relative; }
        .menu-lines::before, .menu-lines::after { position: absolute; left: 0; content: ""; }
        .menu-lines::before { top: -6px; }
        .menu-lines::after { top: 6px; }
        main {
            min-width: 0;
            padding: 14px max(12px, env(safe-area-inset-right)) 18px max(12px, env(safe-area-inset-left));
        }
        footer {
            padding: 6px 12px calc(8px + env(safe-area-inset-bottom));
            color: #9b8d7d;
            font-size: .62rem;
            line-height: 1.45;
            text-align: center;
        }
        footer a { color: inherit; }
        .backdrop {
            position: fixed;
            z-index: 40;
            inset: 0;
            border: 0;
            opacity: 0;
            pointer-events: none;
            background: rgba(28, 20, 17, .48);
            transition: opacity .18s ease;
        }
        aside {
            position: fixed;
            z-index: 41;
            top: 0;
            bottom: 0;
            left: max(0px, calc((100vw - 480px) / 2));
            width: min(82vw, 320px);
            padding: calc(10px + env(safe-area-inset-top)) 12px calc(12px + env(safe-area-inset-bottom));
            color: #332b26;
            background: #fffaf0;
            box-shadow: 10px 0 28px rgba(35, 24, 19, .24);
            transform: translateX(-110%);
            transition: transform .2s ease;
        }
        :host([drawer-open]) .backdrop { opacity: 1; pointer-events: auto; }
        :host([drawer-open]) aside { transform: translateX(0); }
        .drawer-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
        .brand { font-family: Georgia, "Noto Serif SC", serif; font-size: 1.15rem; font-weight: 700; color: #762f2b; }
        nav { display: grid; gap: 8px; }
        nav a {
            display: flex;
            min-height: 48px;
            align-items: center;
            padding: 0 14px;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none;
            background: #f3e8d2;
        }
        nav a[aria-current="page"] { color: #fffaf0; background: #762f2b; }
        .language { margin-top: 24px; border-top: 1px solid #dfd0b9; padding-top: 16px; }
        .language-label { margin: 0 0 9px; color: #73675b; font-size: .82rem; }
        .language-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .language button {
            min-height: 44px;
            border: 1px solid #cdbb9d;
            border-radius: 9px;
            color: #463b33;
            background: #fff;
        }
        .language button[aria-pressed="true"] { border-color: #762f2b; color: #762f2b; background: #f7e8e3; }
        .header-spacer { width: 44px; }
        @media (max-width: 340px) {
            main { padding-inline: 7px; }
        }
    </style>
    <div class="layout">
        <header>
            <button class="icon-button menu" type="button"><span class="menu-lines"></span></button>
            <h1></h1>
            <span class="header-spacer"></span>
        </header>
        <main><slot></slot></main>
        <footer>
            <span class="copyright"></span><br>
            <a href="https://github.com/ylxdzsw/offline" rel="external noopener"></a>
        </footer>
    </div>
    <button class="backdrop" type="button" tabindex="-1"></button>
    <aside aria-hidden="true">
        <div class="drawer-head">
            <span class="brand"></span>
            <button class="icon-button close" type="button" aria-label="Close">✕</button>
        </div>
        <nav>
            <a data-page="gallery" href="./index.html"></a>
            <a data-page="xiangqi" href="./xiangqi.html"></a>
            <a data-page="wuziqi" href="./wuziqi.html"></a>
        </nav>
        <section class="language">
            <p class="language-label"></p>
            <div class="language-buttons">
                <button type="button" data-lang="zh">中文</button>
                <button type="button" data-lang="en">English</button>
            </div>
        </section>
    </aside>
</template>

<script>
customElements.define('offline-shell', class extends HTMLElement {
    constructor() {
        super()
        this.attachShadow({mode: 'open'}).append(document.getElementById('offline-shell-template').content.cloneNode(true))
    }

    connectedCallback() {
        const {i18n} = OfflineGames
        const page = this.getAttribute('page') || 'gallery'
        const titleKey = page === 'gallery' ? 'gallery' : page
        const shadow = this.shadowRoot
        const open = () => {
            this.setAttribute('drawer-open', '')
            shadow.querySelector('aside').setAttribute('aria-hidden', 'false')
            shadow.querySelector('.close').focus()
        }
        const close = () => {
            this.removeAttribute('drawer-open')
            shadow.querySelector('aside').setAttribute('aria-hidden', 'true')
            shadow.querySelector('.menu').focus()
        }

        shadow.querySelector('h1').textContent = i18n.t(titleKey)
        shadow.querySelector('.brand').textContent = i18n.t('siteName')
        shadow.querySelector('.menu').setAttribute('aria-label', i18n.t('menu'))
        shadow.querySelector('.close').setAttribute('aria-label', i18n.t('close'))
        shadow.querySelector('.language-label').textContent = i18n.t('language')
        shadow.querySelector('.copyright').textContent = i18n.t('copyright')
        shadow.querySelector('footer a').textContent = i18n.t('source')
        document.title = `${i18n.t(titleKey)} · ${i18n.t('siteName')}`

        for (const link of shadow.querySelectorAll('nav a')) {
            const key = link.dataset.page
            link.textContent = i18n.t(key === 'gallery' ? 'gallery' : key)
            link.href = i18n.href(link.getAttribute('href'))
            if (key === page) link.setAttribute('aria-current', 'page')
        }
        for (const button of shadow.querySelectorAll('[data-lang]')) {
            button.setAttribute('aria-pressed', String(button.dataset.lang === i18n.locale))
            button.addEventListener('click', () => i18n.setLocale(button.dataset.lang))
        }
        shadow.querySelector('.menu').addEventListener('click', open)
        shadow.querySelector('.close').addEventListener('click', close)
        shadow.querySelector('.backdrop').addEventListener('click', close)
        this.addEventListener('keydown', event => {
            if (event.key === 'Escape' && this.hasAttribute('drawer-open')) close()
        })
    }
})
</script>
