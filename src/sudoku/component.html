<template id="sudoku-game-template">
    <style>
        :host { display: block; }
        .toolbar { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; align-items: end; margin-bottom: 10px; }
        label { display: grid; gap: 3px; color: #746658; font-size: .7rem; }
        select, button { min-height: 42px; border: 1px solid #cdbb9d; border-radius: 9px; color: #44372f; background: #fffaf0; }
        select { min-width: 96px; padding: 0 28px 0 10px; }
        button { padding: 0 12px; font-weight: 650; touch-action: manipulation; }
        button:disabled { opacity: .4; }
        .status { display: flex; min-height: 38px; align-items: center; justify-content: center; margin: 0 0 9px; border-radius: 9px; color: #5a4037; font-size: .9rem; font-weight: 700; background: #efe1c9; }
        .warning { margin: 0 0 9px; color: #8c3c35; font-size: .77rem; text-align: center; }
        .warning[hidden] { display: none; }
        .board { display: grid; width: 100%; aspect-ratio: 1; grid-template-columns: repeat(9, 1fr); overflow: hidden; border: 2px solid #5d4538; border-radius: 8px; background: #fffdf7; box-shadow: 0 4px 12px rgba(69, 44, 28, .12); user-select: none; }
        .cell { position: relative; display: grid; min-width: 0; min-height: 0; padding: 0; border: 0; border-right: 1px solid #c8bba7; border-bottom: 1px solid #c8bba7; border-radius: 0; place-items: center; color: #315c87; background: #fffdf7; font-size: clamp(1.05rem, 6vw, 1.55rem); font-weight: 600; }
        .cell:nth-child(9n) { border-right: 0; }
        .cell:nth-child(n+73) { border-bottom: 0; }
        .cell.box-right { border-right: 2px solid #6b5545; }
        .cell.box-bottom { border-bottom: 2px solid #6b5545; }
        .cell.given { color: #3e342d; font-weight: 750; }
        .cell.related { background: #f2eadc; }
        .cell.same { background: #ead8b8; }
        .cell.selected { background: #d9e7ed; box-shadow: inset 0 0 0 2px #47758a; }
        .cell.conflict { color: #a42f2b; background: #f6d7d1; }
        .notes { position: absolute; inset: 2px; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); color: #60717c; font-size: clamp(.42rem, 2.3vw, .64rem); font-weight: 500; line-height: 1; }
        .notes i { display: grid; place-items: center; font-style: normal; }
        .pad { display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px; margin-top: 10px; }
        .digit { min-width: 0; min-height: 45px; padding: 0; border-color: #baa783; color: #573e30; background: #f5e6c9; font-size: 1.1rem; }
        .digit.complete { opacity: .36; }
        .tools { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-top: 8px; }
        .tool.active { border-color: #762f2b; color: #fffaf0; background: #762f2b; }
        @media (max-width: 340px) { .toolbar { gap: 4px; } button { padding-inline: 8px; font-size: .82rem; } select { min-width: 88px; } .digit { min-height: 41px; } }
    </style>
    <div class="toolbar">
        <label><span class="difficulty-label"></span><select class="difficulty"><option value="easy"></option><option value="medium"></option><option value="hard"></option></select></label>
        <button class="undo" type="button"></button>
        <button class="new" type="button"></button>
    </div>
    <p class="warning" hidden></p>
    <div class="status" role="status" aria-live="polite"></div>
    <div class="board" role="grid"></div>
    <div class="pad" aria-label="Number pad"></div>
    <div class="tools">
        <button class="tool erase" type="button"></button>
        <button class="tool notes-toggle" type="button" aria-pressed="false"></button>
        <button class="tool hint" type="button"></button>
    </div>
</template>

<script>
OfflineGames.wasm.defineElement('sudoku', 'sudoku-game', class extends HTMLElement {
    constructor() {
        super()
        this.attachShadow({mode: 'open'}).append(document.getElementById('sudoku-game-template').content.cloneNode(true))
        this.selected = null
        this.noteMode = false
    }
    connectedCallback() {
        this.engine = OfflineGames.Sudoku
        this.i18n = OfflineGames.i18n
        this.storage = OfflineGames.storage
        this.load()
        this.bind()
        this.localize()
        this.render()
    }
    fresh(difficulty = 'medium') {
        const seed = OfflineGames.runtime.randomSeed(), generated = this.engine.generate(difficulty, seed)
        return {schema: 1, game: 'sudoku', seed, difficulty, puzzle: generated.puzzle, solution: generated.solution, board: generated.puzzle.slice(), notes: Array(81).fill(0), history: [], hints: 0, outcome: null}
    }
    valid(saved) {
        return saved && ['easy', 'medium', 'hard'].includes(saved.difficulty) && [saved.puzzle, saved.solution, saved.board, saved.notes].every(value => Array.isArray(value) && value.length === 81) && Array.isArray(saved.history)
    }
    load() { const saved = this.storage.read('sudoku'); this.state = this.valid(saved) ? saved : this.fresh(); if (!Number.isInteger(this.state.seed)) this.state.seed = OfflineGames.runtime.randomSeed() }
    bind() {
        const shadow = this.shadowRoot
        shadow.querySelector('.board').addEventListener('click', event => { const cell = event.target.closest('.cell'); if (cell) { this.selected = Number(cell.dataset.index); this.render() } })
        shadow.querySelector('.pad').addEventListener('click', event => { const digit = event.target.closest('.digit'); if (digit) this.enter(Number(digit.dataset.digit)) })
        shadow.querySelector('.erase').addEventListener('click', () => this.enter(0))
        shadow.querySelector('.notes-toggle').addEventListener('click', () => { this.noteMode = !this.noteMode; this.render() })
        shadow.querySelector('.hint').addEventListener('click', () => this.hint())
        shadow.querySelector('.undo').addEventListener('click', () => this.undo())
        shadow.querySelector('.new').addEventListener('click', () => this.newGame())
        shadow.querySelector('.difficulty').addEventListener('change', event => this.newGame(event.target.value, true))
        this.addEventListener('keydown', event => {
            if (/^[1-9]$/.test(event.key)) this.enter(Number(event.key))
            else if (event.key === 'Backspace' || event.key === 'Delete') this.enter(0)
            else if (event.key.toLowerCase() === 'n') { this.noteMode = !this.noteMode; this.render() }
        })
    }
    localize() {
        const s = this.shadowRoot, t = key => this.i18n.t(key)
        s.querySelector('.difficulty-label').textContent = t('difficulty')
        for (const option of s.querySelectorAll('.difficulty option')) option.textContent = t(option.value)
        s.querySelector('.undo').textContent = t('undo'); s.querySelector('.new').textContent = t('newGame')
        s.querySelector('.erase').textContent = t('erase'); s.querySelector('.notes-toggle').textContent = t('notes'); s.querySelector('.hint').textContent = t('hint')
        s.querySelector('.warning').textContent = t('storageWarning')
    }
    save() { if (!this.storage.write('sudoku', this.state)) this.shadowRoot.querySelector('.warning').hidden = false }
    enter(digit) {
        const index = this.selected
        if (index == null || this.state.outcome || this.state.puzzle[index]) return
        const before = {index, value: this.state.board[index], notes: this.state.notes[index], peerNotes: []}
        if (this.noteMode && digit) {
            if (this.state.board[index]) return
            this.state.notes[index] ^= 1 << digit
        } else {
            this.state.board[index] = digit
            this.state.notes[index] = 0
            if (digit) for (const peer of this.engine.peers(index)) if (this.state.notes[peer] & (1 << digit)) { before.peerNotes.push([peer, this.state.notes[peer]]); this.state.notes[peer] &= ~(1 << digit) }
        }
        if (before.value === this.state.board[index] && before.notes === this.state.notes[index]) return
        this.state.history.push(before)
        if (this.engine.isComplete(this.state.board, this.state.solution)) this.state.outcome = {ended: true, reason: 'solved'}
        this.save(); this.render()
    }
    hint() {
        if (this.state.outcome) return
        let index = this.selected
        if (index == null || this.state.puzzle[index] || this.state.board[index] === this.state.solution[index]) index = this.state.board.findIndex((value, at) => !this.state.puzzle[at] && value !== this.state.solution[at])
        if (index < 0) return
        this.selected = index
        const wasNoteMode = this.noteMode; this.noteMode = false; this.enter(this.state.solution[index]); this.noteMode = wasNoteMode
        this.state.hints++; this.save(); this.render()
    }
    undo() {
        const previous = this.state.history.pop(); if (!previous) return
        this.state.board[previous.index] = previous.value; this.state.notes[previous.index] = previous.notes
        for (const [index, notes] of previous.peerNotes) this.state.notes[index] = notes
        this.state.outcome = null; this.selected = previous.index; this.save(); this.render()
    }
    newGame(difficulty = this.state.difficulty, force = false) {
        if (!force && this.state.history.length && !this.state.outcome && !confirm(this.i18n.t('confirmNew'))) return
        this.state = this.fresh(difficulty); this.selected = null; this.noteMode = false; this.save(); this.render()
    }
    render() {
        const s = this.shadowRoot, selectedValue = this.selected == null ? 0 : this.state.board[this.selected]
        s.querySelector('.board').innerHTML = this.state.board.map((value, index) => {
            const classes = ['cell']; const row = this.engine.rowOf(index), column = this.engine.columnOf(index)
            if (column === 2 || column === 5) classes.push('box-right'); if (row === 2 || row === 5) classes.push('box-bottom')
            if (this.state.puzzle[index]) classes.push('given')
            if (this.selected != null && (row === this.engine.rowOf(this.selected) || column === this.engine.columnOf(this.selected) || this.engine.boxOf(index) === this.engine.boxOf(this.selected))) classes.push('related')
            if (selectedValue && value === selectedValue) classes.push('same')
            if (this.engine.conflicts(this.state.board, index).length || (value && value !== this.state.solution[index])) classes.push('conflict')
            if (index === this.selected) classes.push('selected')
            const notes = !value ? `<span class="notes">${this.engine.DIGITS.map(digit => `<i>${this.state.notes[index] & (1 << digit) ? digit : ''}</i>`).join('')}</span>` : ''
            return `<button type="button" role="gridcell" class="${classes.join(' ')}" data-index="${index}" aria-selected="${index === this.selected}" aria-label="${this.i18n.t('row')} ${row + 1}, ${this.i18n.t('column')} ${column + 1}, ${value || this.i18n.t('empty')}">${value || notes}</button>`
        }).join('')
        const counts = this.engine.DIGITS.map(digit => this.state.board.filter(value => value === digit).length)
        s.querySelector('.pad').innerHTML = this.engine.DIGITS.map((digit, index) => `<button type="button" class="digit${counts[index] >= 9 ? ' complete' : ''}" data-digit="${digit}" ${counts[index] >= 9 ? 'disabled' : ''}>${digit}</button>`).join('')
        s.querySelector('.status').textContent = this.i18n.t(this.state.outcome ? 'sudokuSolved' : 'sudokuPrompt')
        s.querySelector('.difficulty').value = this.state.difficulty
        s.querySelector('.undo').disabled = !this.state.history.length
        s.querySelector('.hint').disabled = Boolean(this.state.outcome)
        s.querySelector('.notes-toggle').classList.toggle('active', this.noteMode)
        s.querySelector('.notes-toggle').setAttribute('aria-pressed', String(this.noteMode))
    }
})
</script>
