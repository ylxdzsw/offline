<template id="chess-game-template">
    <style>
        :host { display:block; color:var(--ink); }
        .toolbar{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:end;margin-bottom:10px}
        label{display:grid;gap:3px;color:var(--ink-muted);font-size:.7rem;font-weight:600;letter-spacing:.02em}
        select,.action{min-height:var(--control-h,42px);border:1px solid var(--border-strong);border-radius:var(--radius-sm);color:var(--ink);background:var(--bg-surface)}
        select{min-width:96px;padding:0 28px 0 10px}.action{padding:0 12px;font-weight:650}.action:disabled{opacity:.42}
        .status{display:flex;min-height:38px;align-items:center;justify-content:center;margin:0 0 9px;border-radius:var(--radius-sm);color:var(--status-ink);font-size:.93rem;font-weight:700;background:var(--status-bg)}
        .status.thinking::after{width:5px;height:5px;margin-left:7px;border-radius:50%;content:"";background:currentColor;animation:pulse .8s ease-in-out infinite alternate}
        @keyframes pulse{to{opacity:.2;transform:scale(.7)}}
        .warning{margin:0 0 9px;color:var(--danger);font-size:.77rem;text-align:center}.warning[hidden]{display:none}
        .board-wrap{position:relative}
        .board{display:grid;width:100%;aspect-ratio:1;grid-template:repeat(8,1fr)/repeat(8,1fr);overflow:hidden;border:2px solid var(--border-strong);border-radius:var(--radius-sm);box-shadow:var(--shadow-soft);user-select:none;touch-action:manipulation}
        .square{position:relative;display:grid;min-width:0;min-height:0;padding:0;border:0;border-radius:0;place-items:center;color:var(--ink)}
        .square.light{background:var(--board-light)}.square.dark{background:var(--board-dark)}
        .square.last.light{background:var(--board-last-light)}.square.last.dark{background:var(--board-last-dark)}
        .square.selected{box-shadow:inset 0 0 0 3px var(--selected)}
        .square.check{background:var(--check)}
        .square.legal::after{position:absolute;width:24%;height:24%;border-radius:50%;content:"";background:var(--legal)}
        .square.capture::after{position:absolute;inset:7%;border:3px solid var(--capture);border-radius:50%;content:""}
        .piece{position:relative;z-index:1;width:84%;height:84%;overflow:visible;filter:drop-shadow(0 2px 1px rgba(0,0,0,.28))}
        .piece *{fill:currentColor;stroke:var(--outline);stroke-width:1.2;stroke-linejoin:round}
        .piece.white{--outline:var(--piece-outline);color:var(--piece-white)}
        .piece.black{--outline:var(--piece-outline);color:var(--piece-black)}
        .coord{position:absolute;z-index:2;color:color-mix(in srgb,var(--ink) 55%,transparent);font-size:clamp(.45rem,1.9vw,.62rem);font-weight:750;pointer-events:none}
        .rank{top:2px;left:3px}.file{right:3px;bottom:2px}
        .dark .coord{color:color-mix(in srgb,var(--piece-white) 75%,transparent)}
        .promotion{position:absolute;z-index:5;inset:0;display:grid;align-content:center;justify-items:center;padding:18px;background:var(--drawer-scrim);backdrop-filter:blur(2px)}
        .promotion[hidden]{display:none}
        .promotion-card{width:min(92%,330px);padding:15px;border:1px solid var(--border);border-radius:var(--radius-md);text-align:center;background:var(--bg-surface);box-shadow:var(--shadow)}
        .promotion p{margin:0 0 12px;color:var(--ink);font-weight:750}
        .choices{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
        .choice{display:grid;aspect-ratio:1;min-width:0;padding:4px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);place-items:center;color:var(--ink);background:var(--bg-elevated)}
        .choice .piece{width:90%;height:90%}
        .files{display:grid;grid-template-columns:repeat(8,1fr);padding:4px 3px 0;color:var(--ink-faint);font-size:.62rem;text-align:center}
        @media(max-width:340px){.toolbar{gap:4px}.action{padding-inline:8px;font-size:.82rem}select{min-width:88px}}
    </style>
    <div class="toolbar"><label><span class="difficulty-label"></span><select class="difficulty"><option value="easy"></option><option value="medium"></option><option value="hard"></option></select></label><button class="action undo" type="button"></button><button class="action new" type="button"></button></div>
    <p class="warning" hidden></p><div class="status" role="status" aria-live="polite"></div>
    <div class="board-wrap"><div class="board" role="grid"></div><div class="promotion" hidden><div class="promotion-card"><p></p><div class="choices"></div></div></div></div>
    <div class="files" aria-hidden="true"><span>a</span><span>b</span><span>c</span><span>d</span><span>e</span><span>f</span><span>g</span><span>h</span></div>
</template>

<script>
OfflineGames.wasm.defineElement('chess','chess-game',class extends HTMLElement{
    constructor(){super();this.attachShadow({mode:'open'}).append(document.getElementById('chess-game-template').content.cloneNode(true));this.selected=null;this.legal=[];this.promotionMoves=null;this.thinking=false;this.worker=null;this.requestId=0}
    connectedCallback(){this.engine=OfflineGames.Chess;this.i18n=OfflineGames.i18n;this.storage=OfflineGames.storage;this.load();this.bind();this.localize();this.render();if(this.state.turn===this.engine.BLACK&&!this.state.outcome)this.requestAI()}
    disconnectedCallback(){this.cancelAI()}
    fresh(difficulty='medium'){const position=this.engine.initialState();return{schema:1,game:'chess',seed:OfflineGames.runtime.randomSeed(),difficulty,...position,history:[],keys:[this.engine.positionKey(position)],outcome:null}}
    valid(saved){return saved&&Array.isArray(saved.board)&&saved.board.length===64&&[this.engine.WHITE,this.engine.BLACK].includes(saved.turn)&&saved.castling&&['easy','medium','hard'].includes(saved.difficulty)&&Array.isArray(saved.history)&&Array.isArray(saved.keys)}
    load(){const saved=this.storage.read('chess');this.state=this.valid(saved)?saved:this.fresh();if(!Number.isInteger(this.state.seed))this.state.seed=OfflineGames.runtime.randomSeed()}
    position(){return{board:this.state.board,turn:this.state.turn,castling:this.state.castling,enPassant:this.state.enPassant,halfmove:this.state.halfmove,fullmove:this.state.fullmove}}
    bind(){const s=this.shadowRoot;s.querySelector('.board').addEventListener('click',event=>{const square=event.target.closest('.square');if(square)this.tap(Number(square.dataset.index))});s.querySelector('.choices').addEventListener('click',event=>{const choice=event.target.closest('.choice');if(choice)this.promote(choice.dataset.type)});s.querySelector('.undo').addEventListener('click',()=>this.undo());s.querySelector('.new').addEventListener('click',()=>this.newGame());s.querySelector('.difficulty').addEventListener('change',event=>{this.state.difficulty=event.target.value;this.save()})}
    localize(){const s=this.shadowRoot,t=key=>this.i18n.t(key);s.querySelector('.difficulty-label').textContent=t('difficulty');for(const option of s.querySelectorAll('option'))option.textContent=t(option.value);s.querySelector('.undo').textContent=t('undo');s.querySelector('.new').textContent=t('newGame');s.querySelector('.warning').textContent=t('storageWarning');s.querySelector('.promotion p').textContent=t('choosePromotion')}
    repetitions(){return this.state.keys.reduce((counts,key)=>{counts[key]=(counts[key]||0)+1;return counts},{})}
    save(){if(!this.storage.write('chess',this.state))this.shadowRoot.querySelector('.warning').hidden=false}
    tap(index){if(this.thinking||this.state.outcome||this.state.turn!==this.engine.WHITE||this.promotionMoves)return;const piece=this.state.board[index];if(this.engine.sideOf(piece)===this.engine.WHITE){this.select(index);return}if(this.selected==null)return;const moves=this.legal.filter(move=>move.to===index);if(!moves.length){this.clearSelection();this.render();return}if(moves.length>1){this.promotionMoves=moves;this.render();return}this.commit(moves[0],this.engine.WHITE)}
    select(index){this.selected=index;this.legal=this.engine.legalMoves(this.position(),this.engine.WHITE).filter(move=>move.from===index);this.render()}
    clearSelection(){this.selected=null;this.legal=[];this.promotionMoves=null}
    promote(type){const move=this.promotionMoves?.find(candidate=>candidate.promotion===type);if(move)this.commit(move,this.engine.WHITE)}
    snapshot(side){return{side,position:this.position(),outcome:this.state.outcome,keysLength:this.state.keys.length}}
    commit(move,side){this.state.history.push(this.snapshot(side));const next=this.engine.applyMove(this.position(),move);Object.assign(this.state,next);this.state.keys.push(this.engine.positionKey(next));const outcome=this.engine.status(next,this.repetitions());this.state.outcome=outcome.ended?outcome:null;this.clearSelection();this.save();this.render();if(!this.state.outcome&&this.state.turn===this.engine.BLACK)this.requestAI()}
    requestAI(){this.cancelAI();this.thinking=true;const id=++this.requestId;this.worker=OfflineGames.runtime.createWorker('chess-worker-payload');this.worker.onmessage=event=>{if(event.data.id!==id||!this.thinking)return;const found=this.engine.legalMoves(this.position(),this.engine.BLACK).find(move=>move.from===event.data.move?.from&&move.to===event.data.move?.to&&move.promotion===event.data.move?.promotion);this.cancelAI(false);if(found)this.commit(found,this.engine.BLACK)};this.worker.onerror=error=>{console.error(error);this.cancelAI(false);this.render()};this.worker.postMessage({id,state:this.position(),difficulty:this.state.difficulty,seed:OfflineGames.runtime.moveSeed(this.state.seed,this.state.history.length)});this.render()}
    cancelAI(invalidate=true){if(invalidate)this.requestId++;if(this.worker)this.worker.terminate();this.worker=null;this.thinking=false}
    undo(){if(!this.state.history.length)return;const wasThinking=this.thinking;this.cancelAI();let count=wasThinking||this.state.history.at(-1).side===this.engine.WHITE?1:2,previous;while(count-->0&&this.state.history.length)previous=this.state.history.pop();if(previous){Object.assign(this.state,previous.position);this.state.outcome=previous.outcome;this.state.keys=this.state.keys.slice(0,previous.keysLength)}this.clearSelection();this.save();this.render()}
    newGame(){if(this.state.history.length&&!confirm(this.i18n.t('confirmNew')))return;const difficulty=this.state.difficulty;this.cancelAI();this.state=this.fresh(difficulty);this.clearSelection();this.save();this.render()}
    statusText(){if(this.state.outcome){if(!this.state.outcome.winner)return this.i18n.t('draw');return this.i18n.t(this.state.outcome.winner===this.engine.WHITE?'youWin':'aiWins')}if(this.thinking||this.state.turn===this.engine.BLACK)return this.i18n.t('aiThinking');return this.i18n.t(this.engine.isInCheck(this.position(),this.engine.WHITE)?'check':'yourTurn')}
    pieceName(piece){if(!piece)return this.i18n.t('empty');const color=this.engine.sideOf(piece)===this.engine.WHITE?'White':'Black';return this.i18n.t('chessPiece'+this.engine.typeOf(piece)+color)}
    pieceSvg(type,side){const shapes={K:'<path d="M21 5h6v6h6v6h-6v6h-6v-6h-6v-6h6z"/><path d="M15 38h18l-3-15H18z"/><path d="M11 43h26l-2-6H13z"/>',Q:'<circle cx="10" cy="10" r="3"/><circle cx="24" cy="6" r="3"/><circle cx="38" cy="10" r="3"/><path d="M10 13l6 19h16l6-19-9 10-5-14-5 14z"/><path d="M12 42h24l-3-10H15z"/>',R:'<path d="M10 7h7v6h5V7h7v6h5V7h5v14H9V7z"/><path d="M14 20h20l-2 17H16z"/><path d="M10 43h28l-4-7H14z"/>',B:'<path d="M24 5c8 7 10 14 2 21l-5-5 5-6-3-3-5 8 4 7c-7 4-8 10-8 10h20s-1-7-7-10c8-8 5-16-3-22z"/><path d="M10 43h28l-4-7H14z"/>',N:'<path d="M13 37c0-13 5-18 13-25l-3-6c11 2 17 11 15 22l-8-5-8 5 9 4 3 5z"/><circle cx="29" cy="13" r="1.7" style="fill:var(--outline);stroke:none"/><path d="M10 43h28l-4-7H14z"/>',P:'<circle cx="24" cy="13" r="8"/><path d="M17 34c1-8 4-12 7-12s6 4 7 12z"/><path d="M11 43h26l-4-9H15z"/>'};return`<svg class="piece ${side===this.engine.WHITE?'white':'black'}" viewBox="0 0 48 48" aria-hidden="true">${shapes[type]}</svg>`}
    render(){const s=this.shadowRoot,legalTargets=new Map(this.legal.map(move=>[move.to,Boolean(move.captured)])),whiteCheck=this.engine.isInCheck(this.position(),this.engine.WHITE),blackCheck=this.engine.isInCheck(this.position(),this.engine.BLACK)
        const actualLast=this.state.keys.length>1?this.state.history.at(-1):null
        s.querySelector('.board').innerHTML=this.state.board.map((piece,index)=>{const row=this.engine.rowOf(index),column=this.engine.columnOf(index),classes=['square',(row+column)%2?'dark':'light'];if(index===this.selected)classes.push('selected');if(legalTargets.has(index))classes.push(legalTargets.get(index)?'capture':'legal');const prior=actualLast?.position.board;if(prior&&(prior[index]!==piece)&&(piece||prior[index]))classes.push('last');if(piece==='wK'&&whiteCheck||piece==='bK'&&blackCheck)classes.push('check');const token=piece?this.pieceSvg(this.engine.typeOf(piece),this.engine.sideOf(piece)):'';const rank=column===0?`<span class="coord rank">${8-row}</span>`:'';return`<button type="button" role="gridcell" class="${classes.join(' ')}" data-index="${index}" aria-label="${this.pieceName(piece)}, ${'abcdefgh'[column]}${8-row}">${rank}${token}</button>`}).join('')
        const status=s.querySelector('.status');status.textContent=this.statusText();status.classList.toggle('thinking',this.thinking);s.querySelector('.difficulty').value=this.state.difficulty;s.querySelector('.undo').disabled=!this.state.history.length;s.querySelector('.board').setAttribute('aria-disabled',String(this.thinking||Boolean(this.state.outcome)||Boolean(this.promotionMoves)))
        const promotion=s.querySelector('.promotion');promotion.hidden=!this.promotionMoves;s.querySelector('.choices').innerHTML=this.promotionMoves?['Q','R','B','N'].map(type=>`<button type="button" class="choice" data-type="${type}" aria-label="${this.i18n.t('chessPiece'+type+'White')}">${this.pieceSvg(type,this.engine.WHITE)}</button>`).join(''):''
    }
})
</script>
